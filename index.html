<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentación Ingeniera de Sistemas</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #caf0f8, #ffffff);
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #0077b6;
      font-size: 2.3em;
    }

    h2 {
      color: #023e8a;
    }

    button {
      background-color: #00b4d8;
      color: white;
      border: none;
      padding: 15px 20px;
      font-size: 18px;
      margin: 10px;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 0 #0077b6;
      transition: all 0.2s;
    }

    button:hover {
      background-color: #0096c7;
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #0077b6;
    }

    img {
      max-width: 150px;
      margin: 10px;
      border-radius: 12px;
    }

    .imagenes {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    #contador {
      font-size: 2em;
      margin: 10px;
      color: #03045e;
    }
  </style>
</head>

<body>

  <h1>¡Hola! Soy Sophia Valentina 👧💻</h1>
  <h2>Del Colegio La Salle Arequipa 🏫</h2>
  <h2>¡Soy una Ingeniera de Sistemas! 🤖✨</h2>

  <!-- SALUDO -->
  <button onclick="hablar('Hola, mi amiga Sophia Valentina les ha explicado que hace un ingeniero de sistemas.')">
    🎤 Saludar
  </button>

  <!-- IMÁGENES -->
  <div class="imagenes">
    <img src="https://www.ime.usp.br/~gold/new/assets/img/Page-14-Image-38.png">
  </div>

  <!-- CONTADOR SIMPLE -->
  <h2>¡Contemos juntos! 🎉</h2>
  <p id="contador">0</p>
  <button onclick="sumar()">Haz clic para contar</button>

  <!-- DESPEDIDA -->
  <br><br>
  <button onclick="hablar('Muchas gracias miss Karelym y amiguitos de Sophia Valentina. Que tengan un bonito día.')">
    👋 Despedida
  </button>

  <script>
    // Voz
    function hablar(texto) {
      const synth = window.speechSynthesis;
      const utter = new SpeechSynthesisUtterance(texto);
      utter.lang = 'es-PE';
      synth.speak(utter);
    }

    // Contador simple
    let numero = 0;
    function sumar() {
      numero++;
      document.getElementById("contador").textContent = numero;
    }
  </script>

</body>
</html>
