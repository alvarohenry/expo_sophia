<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentación Ingeniera de Sistemas</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #caf0f8, #ffffff);
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #0077b6;
      font-size: 2.3em;
    }

    h2 {
      color: #023e8a;
    }

    button {
      background-color: #00b4d8;
      color: white;
      border: none;
      padding: 15px 20px;
      font-size: 18px;
      margin: 10px;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 0 #0077b6;
      transition: all 0.2s;
    }

    button:hover {
      background-color: #0096c7;
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #0077b6;
    }

    img {
      max-width: 150px;
      margin: 10px;
      border-radius: 12px;
    }

    .imagenes {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    #contador {
      font-size: 2em;
      margin: 10px;
      color: #03045e;
    }

    /* Contenedor del juego */
    #juego {
      width: 500px;
      height: 400px;
      border: 2px solid #000;
      margin: 20px auto;
      position: relative;
      background-color: #cceeff;
      overflow: hidden;
    }

    /* Estilo de los globos */
    .globo {
      width: 50px;
      height: 70px;
      border-radius: 50% 50% 50% 50%;
      position: absolute;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .globo:hover {
      transform: scale(1.2);
    }
  </style>
</head>

<body>

  <h1>¡Hola! esta página es para Sophia Valentina 👧💻</h1>
  
  <!-- SALUDO -->
  <button onclick="hablar('Hola, mi amiga Sophia Valentina les ha explicado que hace un ingeniero de sistemas.')">
    🎤 Saludar
  </button>

  <!-- IMÁGENES -->
  <div class="imagenes">
    <img src="https://www.ime.usp.br/~gold/new/assets/img/Page-14-Image-38.png">
  </div>
  
  <!-- DESPEDIDA -->
  <br><br>
  <button onclick="hablar('Muchas gracias miss Karelym y amiguitos de Sophia Valentina. Que tengan un bonito dia.')">
    👋 Despedida
  </button>

 
</body>
</html>
